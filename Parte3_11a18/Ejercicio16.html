<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16 - Calculadora con Funciones Flecha</title>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="css/Ejercicio16.css">
    <!-- Enlace a SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="container">
    <h2>Calculadora Básica</h2>
    
    <!-- Campos de entrada para los números -->
    <div class="form-group">
        <label for="numero1">Primer Número:</label>
        <input type="text" id="numero1" placeholder="Ej. 10">
    </div>
    
    <div class="form-group">
        <label for="numero2">Segundo Número:</label>
        <input type="text" id="numero2" placeholder="Ej. 5">
    </div>
    
    <!-- Botones para cada operación -->
    <div class="buttons">
        <button onclick="calcularOperacion('suma')">Sumar</button>
        <button onclick="calcularOperacion('resta')">Restar</button>
        <button onclick="calcularOperacion('multiplicacion')">Multiplicar</button>
        <button onclick="calcularOperacion('division')">Dividir</button>
    </div>

    <hr>
    
    <!-- Caja de texto para mostrar el resultado -->
    <div class="form-group">
        <label for="resultado">Resultado:</label>
        <input type="text" id="resultado" readonly>
    </div>
</div>

<!-- Enlace al archivo JavaScript -->
<script src="js/Ejercicio16.js"></script>
</body>
</html>
