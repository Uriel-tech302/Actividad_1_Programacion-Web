<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - Verificador de Voto</title>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="css/Ejercicio13.css">
</head>
<body>

    <div class="container">
        <h2>Verificador de Votación</h2>
        
        <div class="form-group">
            <label for="edad">Ingresa tu edad:</label>
            <input type="number" id="edad" placeholder="Ej. 20" min="0">
        </div>

        <div class="form-group">
            <button id="btnVerificar">Verificar</button>
        </div>

        <div class="form-group">
            <label for="resultado">Resultado:</label>
            <!-- Caja de texto de solo lectura -->
            <input type="text" id="resultado" readonly placeholder="Aquí aparecerá el resultado">
        </div>
    </div>

    <!-- Enlace al archivo JavaScript -->
    <script src="js/Ejercicio13.js"></script>
</body>
</html>
