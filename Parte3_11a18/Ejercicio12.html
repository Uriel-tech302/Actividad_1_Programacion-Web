<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Distancia | Km a Millas</title>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="css/Ejercicio12.css">
</head>
<body>

    <div class="converter-card">
        <h2>Conversor de Distancia</h2>
        
        <div class="form-group">
            <label for="kilometros">Distancia en Kilómetros (km)</label>
            <input type="text" id="kilometros" placeholder="Ej. 120">
            <div id="error-msg" class="error"></div>
        </div>

        <div class="form-group">
            <button id="btn-convertir">Calcular Conversión</button>
        </div>

        <div class="form-group">
            <label for="millas">Distancia en Millas (mi)</label>
            <input type="text" id="millas" readonly placeholder="Resultado">
        </div>
    </div>

    <!-- Enlace al archivo JavaScript -->
    <script src="js/Ejercicio12.js"></script>
</body>
</html>
