<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Celsius a Fahrenheit</title>
    <link rel="stylesheet" href="css/Ejercicio11.css">
</head>
<body>
    <div class="contenedor">
        <h1>Conversor de Temperatura</h1>
        <p>Ingresa la temperatura en grados Celsius y conviértela a Fahrenheit.</p>

        <form id="formulario">
            <label for="celsius">Grados Celsius:</label>
            <input type="number" id="celsius" placeholder="Ej: 25" required>

            <label for="fahrenheit">Grados Fahrenheit:</label>
            <input type="text" id="fahrenheit" readonly placeholder="Resultado">

            <button type="button" id="convertir">Convertir</button>
        </form>
    </div>

    <script src="js/Ejercicio11.js"></script>
</body>
</html>
