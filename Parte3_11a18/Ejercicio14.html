<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14 - Operaciones con Arreglos</title>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="css/Ejercicio14.css">
</head>
<body>

    <div class="container">
        <h2>Calculadora de Arreglos</h2>
        
        <div class="form-group">
            <label for="numerosInput">Ingresa números separados por comas:</label>
            <input type="text" id="numerosInput" placeholder="Ej. 10, 20, 30, 40, 50">
        </div>

        <div class="form-group">
            <button id="btnCalcular">Calcular</button>
        </div>

        <hr>

        <div class="form-group">
            <label for="numeroMayor">Número mayor:</label>
            <input type="text" id="numeroMayor" readonly placeholder="Resultado">
        </div>

        <div class="form-group">
            <label for="numeroMenor">Número menor:</label>
            <input type="text" id="numeroMenor" readonly placeholder="Resultado">
        </div>

        <div class="form-group">
            <label for="promedio">Promedio:</label>
            <input type="text" id="promedio" readonly placeholder="Resultado">
        </div>
    </div>

    <!-- Enlace al archivo JavaScript -->
    <script src="js/Ejercicio14.js"></script>
</body>
</html>
